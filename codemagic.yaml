# MediControl iOS — Codemagic
#
# Antes del primer build:
# 1. App Store Connect → Users → Integrations → API Key (rol App Manager o superior)
# 2. Codemagic → Team → Integrations → conectar la misma key (nombre único, ej. MediControl_ASC)
# 3. Sustituye abajo TU_APP_STORE_CONNECT_KEY por ese nombre EXACTO (sin comillas extra)
# 4. App Store Connect → My Apps: app creada con Bundle ID com.medicontrol.app
#
# La app carga la web desde Vercel (capacitor.config.ts → server.url). Tras npm ci solo hace cap sync.

workflows:
  medicontrol-ios:
    name: MediControl iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: TU_APP_STORE_CONNECT_KEY
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.medicontrol.app
      vars:
        BUNDLE_ID: "com.medicontrol.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      xcode: latest
      node: 20
    scripts:
      - name: Instalar dependencias
        script: |
          npm ci
      - name: Sincronizar Capacitor (iOS)
        script: |
          npx cap sync ios
      - name: Configurar perfiles de firma
        script: |
          xcode-project use-profiles
      - name: Generar IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - alertas.medicamentos@gmail.com
        notify:
          success: true
          failure: true
      # Sube el IPA a App Store Connect con la misma API key que integrations (auth: integration).
      # Cuando Apple termine de procesar el build, aparecerá en TestFlight / el selector de builds.
      app_store_connect:
        auth: integration
        # Pon true si quieres que Codemagic envíe también a revisión beta de TestFlight (opcional).
        submit_to_testflight: false
