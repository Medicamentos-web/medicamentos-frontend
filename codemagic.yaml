# MediControl iOS — Codemagic
#
# Antes del primer build:
# 1. App Store Connect → Users → Integrations → API Key (rol App Manager o superior)
# 2. Codemagic → Team → Integrations → Developer Portal → misma API key (.p8 + Issuer ID + Key ID)
# 3. app_store_connect debe coincidir con el nombre de la key en Codemagic → Integrations (si renombraste la key, cámbialo aquí)
# 4. developer.apple.com → Identifiers → App ID com.medicontrol.app (tipo App)
# 5. App Store Connect → My Apps → app con el mismo Bundle ID
#
# ERROR: "No matching profiles found ... app_store"
# Hace falta certificado Apple Distribution + perfil App Store en Codemagic (vinculados a la API key):
# • Codemagic → Team → codemagic.yaml settings (o Code signing identities)
#   → iOS certificates: Generate o Fetch (Apple Distribution)
#   → iOS provisioning profiles: Fetch profiles → App Store → com.medicontrol.app
#   Si no existe el perfil: developer.apple.com → Profiles → + → App Store → App ID anterior
#
# La app carga la web desde Vercel (capacitor.config.ts → server.url).

workflows:
  medicontrol-ios:
    name: MediControl iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic MediControl"
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.medicontrol.app
      vars:
        BUNDLE_ID: "com.medicontrol.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # (Playwright no está en package.json; se deja por si se vuelve a añadir como devDependency.)
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      xcode: latest
      node: 20
    scripts:
      - name: Instalar dependencias
        script: |
          set -euo pipefail
          cd "${CM_BUILD_DIR:-.}"
          node -v && npm -v
          export CI=true
          export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
          npm ci --no-audit --no-fund
      - name: Sincronizar Capacitor (iOS)
        script: |
          set -euo pipefail
          cd "${CM_BUILD_DIR:-.}"
          # Capacitor en Windows genera rutas con \ en Package.swift; en Swift eso rompe SPM en macOS.
          node scripts/fix-ios-spm-package.js
          npx cap sync ios
          node scripts/fix-ios-spm-package.js
      - name: Configurar perfiles de firma
        script: |
          xcode-project use-profiles
      - name: Generar IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - alertas.medicamentos@gmail.com
        notify:
          success: true
          failure: true
      # Sube el IPA y, tras procesarlo Apple, envía a revisión beta de TestFlight (sin beta_groups:
      # puedes usar testers internos de tu equipo en App Store Connect).
      app_store_connect:
        auth: integration
        submit_to_testflight: true
