# Render Blueprint - medicamentos-backend
# Si usas medicamentos-frontend (monorepo): Root Directory = backend
# Si usas medicamentos-backend (solo backend): Root Directory = vacío
services:
  - type: web
    name: medicamentos-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: DEFAULT_TEMP_PASSWORD
        value: "123456"
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "MediControl <alertas.medicamentos@gmail.com>"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: DEFAULT_FAMILY_ID
        value: "1"
      - key: CORS_EXTRA_ORIGINS
        sync: false
      # Opcional: API DrugBank para interacciones medicamentosas (sin clave = fallback local)
      - key: DRUGBANK_API_KEY
        sync: false
